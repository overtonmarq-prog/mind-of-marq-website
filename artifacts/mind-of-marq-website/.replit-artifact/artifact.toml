kind = "web"
previewPath = "/"
title = "M.O.M. Kids StoryWorld"
version = "1.0.0"
id = "artifacts/mind-of-marq-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24843
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mind-of-marq-website run dev"

[services.env]
PORT = "24843"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mind-of-marq-website", "run", "build"]
publicDir = "artifacts/mind-of-marq-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
